<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventHub - Đăng ký</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">EventHub</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Trang chủ</a></li>
                    <li class="nav-item"><a class="nav-link" href="courses.html">Sự kiện/Khóa học</a></li>
                    <li class="nav-item"><a class="nav-link active" href="register.html">Đăng ký</a></li>
                    <li class="nav-item"><a class="nav-link" href="registrations.html">Đã đăng ký</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h2 class="mb-4 text-center">Đăng ký tham gia</h2>
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <form id="registerForm" novalidate>
                            <div class="mb-3">
                                <label class="form-label">Họ và tên <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="regName">
                                <div class="invalid-feedback">Họ và tên không được rỗng và tối thiểu 3 ký tự.</div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Email <span class="text-danger">*</span></label>
                                    <input type="email" class="form-control" id="regEmail">
                                    <div class="invalid-feedback">Email không hợp lệ.</div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Số điện thoại <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="regPhone">
                                    <div class="invalid-feedback">Số điện thoại phải từ 9-11 chữ số.</div>
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-4">
                                    <label class="form-label">Lớp <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="regClass">
                                    <div class="invalid-feedback">Lớp không được để trống.</div>
                                </div>
                                <div class="col-md-8">
                                    <label class="form-label">Khóa học / Sự kiện <span class="text-danger">*</span></label>
                                    <select class="form-select" id="regCourse">
                                        </select>
                                    <div class="invalid-feedback">Vui lòng chọn một khóa học.</div>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Ghi chú</label>
                                <textarea class="form-control" id="regNote" rows="3"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2">Xác nhận Đăng ký</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
